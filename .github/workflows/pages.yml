name: Deploy dashboard to GitHub Pages

# Publishes the self-contained static dashboard (app/index.html, data embedded)
# as a public, always-on site — no backend, no Databricks needed to view it.
# Enable once in the repo: Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "app/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload the app/ folder as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
